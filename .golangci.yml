# klarlabs-studio shared Go lint bar (golangci-lint v2). gocritic is part of
# the org bar — do not drop it. Code-level security is owned by nox
# (taint-analysis + core ruleset), not gosec.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gocritic     # org engineering bar — do not drop
  settings:
    misspell:
      locale: US
    errcheck:
      # coverctl is a CLI: fmt.Fprint* write to os.Stdout/Stderr and in-memory
      # buffers, where a write error is neither actionable nor recoverable.
      # Checking these is the canonical errcheck false positive.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  # Code-level security is owned by nox (taint-analysis + core ruleset),
  # not gosec — no gosec exclusions needed.

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
