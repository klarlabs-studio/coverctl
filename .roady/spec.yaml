id: coverctl
title: coverctl
description: Initial product specification generated by roady.
features:
    - id: core-foundation
      title: Core Foundation
      description: The essential building blocks of the project.
      requirements: []
    - id: product-messaging-&-docs-alignment
      title: Product Messaging & Docs Alignment
      description: Align CLI help text, README, and PRD with current reality (15 languages, MCP-native, domain-aware positioning). Remove all Go-only wording from user-facing copy unless contextually Go-specific.
      requirements: []
    - id: ai/agent-success-metrics-baseline
      title: AI/Agent Success Metrics Baseline
      description: 'Define and instrument MCP tool-call success metrics: success rate, rejection rate, time-to-success, pre-commit regression catch rate. Enable data-driven decisions on which 3 MCP tools drive retained value.'
      requirements: []
    - id: architecture-drift-guardrails
      title: Architecture Drift Guardrails
      description: Add explicit extraction plan and enforcement for acknowledged large files (service.go, cli.go, server.go). New capabilities must land in dedicated handler files per the existing ceiling-test contract.
      requirements: []
    - id: golden-path-ux-for-first-run
      title: Golden Path UX for First-Run
      description: 'Tighten docs and CLI flow around a single golden path: init -> check -> suggest -> record. Include actionable failure-snippet guidance per step. New user goal: install to first fix in <10 minutes.'
      requirements: []
    - id: ci-product-metrics-dogfooding
      title: CI Product Metrics Dogfooding
      description: Extend CI workflow (go.yml) to preserve machine-readable check/report outputs for trend analysis. Current dogfooding only asserts pass/fail; add structured artifact collection.
      requirements: []
    - id: gtm-&-enterprise-readiness-package
      title: GTM & Enterprise Readiness Package
      description: Build ICP-focused targeting for polyglot AI-assisted teams with compliance governance needs. Publish security architecture doc (MCP threat model + sanitization boundaries).
      requirements: []
    - id: coverage-quality-hotspot-uplift
      title: Coverage Quality Hotspot Uplift
      description: 'Add scenario tests for weaker coverage surfaces: internal/mcp, internal/cli, runner edge cases. Focus on failure-path handling and parser/runner boundary conditions.'
      requirements: []
    - id: wedge-re-anchoring:-prd-and-icp
      title: 'Wedge Re-anchoring: PRD and ICP'
      description: Reframe PRD around agent-loop wedge (in-loop coverage feedback before commit). Prune personas to Taylor primary + Jordan secondary buyer. Replace vanity success metrics (5+ langs shipped, 1000 installs, GitHub stars) with North Star (Weekly Protected Agent Loops) plus input metrics (activation, MCP tool-call success, pre-commit hook adoption, regressions caught per session). Reframe ICP brief competitive alternatives to lead with red-CI-agent-loop status quo (not Codecov). Pull compliance-sensitive paths from ECP gate to expansion accelerator. Replace front-page positioning with single Initiative Hypothesis.
      requirements: []
    - id: agent-mode-onboarding-path
      title: Agent-Mode Onboarding Path
      description: Add parallel Terminal vs AI Agent quick-start path. Agent-mode page shows install, enabling MCP server in Claude Code/Cursor/Cline, first agent-initiated check, agent UI transparency (tool-call visible), approval gate example, structured rejection example, override capability. Cross-link from terminal quick-start. Closes wedge-invisible gap for primary ICP at first contact.
      requirements: []
    - id: golden-path-failure-mode-snippets
      title: Golden-Path Failure-Mode Snippets
      description: 'Add per-step caution blocks to quick-start.mdx covering predictable first-run failures: no language markers detected, missing language toolchain (pytest-cov, nyc, cargo-tarpaulin), profile path mismatch, threshold-too-high first FAIL, no tests detected. Each block names the failure, gives the exact recovery command. Closes the original T-5 requirement properly.'
      requirements: []
    - id: realistic-cli-output-with-inline-next-action-hints
      title: Realistic CLI Output with Inline Next-Action Hints
      description: 'Redesign coverctl check terminal output: realistic mixed PASS/FAIL rows with shortfall delta, summary line, and inline next-action footer (run coverctl suggest DOMAIN / coverctl debt). Update quick-start sample to mirror real output. Adds designed Peak-End moment on first passing check (subtle success line + next-step nudge). Touches internal/cli/check.go print path and docs sample.'
      requirements: []
    - id: mcp-agent-loop-eval-harness
      title: MCP Agent-Loop Eval Harness
      description: 'Build internal/eval/ skeleton: 50-100 synthetic regression scenarios across supported languages (known coverage drop in known domain), scripted headless MCP agent replay, LLM-as-judge for output-interpretation accuracy, tool-selection accuracy and recall metrics, adversarial prompt-injection eval set. Wire into CI as gate. Establishes denominator for North Star regression catch rate that telemetry alone cannot measure.'
      requirements: []
    - id: mode-aware-mcp-tool-surface
      title: Mode-Aware MCP Tool Surface
      description: Add coverctl mcp serve --mode=agent|ci flag. Agent mode advertises pruned 3-tool surface (check, suggest, debt) for reliable agent tool selection within context budget. CI mode advertises full 8 tools (adds report, compare, record, badge, pr-comment). Auto-detect mode by MCP client-id where possible. Validates the check/suggest/debt value-driver hypothesis from metrics spec.
      requirements: []
    - id: mcp-output-boundary-hardening
      title: MCP Output Boundary Hardening
      description: Canonicalize and escape user-controlled strings in MCP tool outputs (file paths, test names, profile contents, PR descriptions in pr-comment) before return to agent. Closes Lethal Trifecta exposure where untrusted content flows from coverage profiles back into agent context as a new prompt-injection vector. Add 50+ adversarial output-injection tests under internal/mcp/. Update docs/security/mcp-threat-model.md with output-boundary controls section.
      requirements: []
    - id: structured-rejection-schema-and-output-budgets
      title: Structured Rejection Schema and Output Budgets
      description: 'Stable JSON schema for all MCP rejection responses with required fields: passed=false, error_code, summary, remediation (agent-actionable next step). Add per-tool output token budget (default 2K), pagination cursors for overflow, verbosity flag (brief|normal|verbose) so agents can request minimal default. Auto-truncate verbose outputs (e.g., report) to top-N failing domains with summary. Reduces context pollution and prevents agent-stuck-on-rejection failures.'
      requirements: []
    - id: pricing-and-monetization-wedge-decision
      title: Pricing and Monetization Wedge Decision
      description: 'Two-page strategy decision doc evaluating monetization options for coverctl: open-core (paid hosted coverage history, team dashboards, cloud MCP relay), paid SLA support contracts, enterprise security feature gate (audit logging, SSO, compliance exports), or remain pure OSS with sponsorship. Decide before scaling community-led GTM. Decision artifact only, no implementation in this task. Output: docs/strategy/monetization-decision.md.'
      requirements: []
    - id: category-point-of-view-doc
      title: Category Point-of-View Doc
      description: 'Two-page Lochhead Point-of-View document defining the agent-loop coverage category. Sections: world today (red-CI agent loops, polyglot tool sprawl, governance gap), world we are describing (in-loop coverage governance, MCP-callable, polyglot-uniform), why now (3 bullets: Claude Code adoption inflection, MCP standard emerging, polyglot pain), the category name, who benefits most (pruned ECP). Drives README hero, content calendar seed articles, conference pitch language. Output: docs/strategy/category-pov.md.'
      requirements: []
    - id: activation-funnel-and-gtm-metrics
      title: Activation Funnel and GTM Metrics
      description: 'Distinct GTM funnel metrics layer separate from tool-execution telemetry: activation rate (init users reaching first passing check), 30-day usage retention (repos calling check weekly), advocate-mention count (unprompted Claude Code/Discord/X mentions), plugin marketplace install velocity, enterprise inbound (procurement document requests), Sean Ellis 40% PMF survey infrastructure. Opt-in trace donation pipeline for real-world data growing eval corpus.'
      requirements: []
    - id: 5-user-polyglot-usability-test
      title: 5-User Polyglot Usability Test
      description: 'Krug-style observed usability test: recruit 5 polyglot devs actively using Claude Code or Cursor, watch them install coverctl from scratch and reach first fix. Two using Python+TS, two using Go+Rust, one using Java or Shell. Measure: did they discover MCP/agent integration unprompted, did first failed check produce a clear next action, time-to-first-fix, abandonment points. Single-day spend. Validates onboarding fixes from features F2/F3/F4 before broader rollout.'
      requirements: []
    - id: module-root-failure-remediation
      title: Module-Root Failure Remediation
      description: 'Surface a clearer error when coverctl check cannot resolve the Go module root. Close the runtime boundary gap evidenced in issue #20 (''module root not found'' even with valid go.mod), where the user explicitly asked for an actionable hint. Add a new operational rejection code (e.g., OP_MODULE_ROOT_MISSING) plus matching remediation copy: list searched paths, suggest passing --language explicitly, suggest running from repo root, suggest checking for nested submodules. Apply at the application service boundary so both CLI and MCP handlers emit the same structured response. Output: extended sanitize.go op-codes, service.go diagnostic, mcp handler integration, regression test.'
      requirements: []
    - id: rust-quick-start-tab
      title: Rust Quick-Start Tab
      description: 'Add a Rust example to the quick-start tabs in both terminal and agent-mode quick-starts. Closes the residual discoverability gap after PR #48 fixed Rust LCOV parsing: a Rust user landing today still sees only Go/Python/TS samples and may assume Rust is unsupported. Show the canonical Rust .coverctl.yaml block, the cargo-llvm-cov invocation, and the LCOV path coverctl reads by default. Output: docs/src/content/docs/quick-start.mdx Tabs item; equivalent agent-mode example in quick-start-agent.mdx; cross-link from troubleshooting if relevant.'
      requirements: []
    - id: coverctl-mcp-doctor-first-run-validation
      title: coverctl mcp doctor First-Run Validation
      description: 'Add a coverctl mcp doctor subcommand that runs the same initialize handshake an MCP client issues, then prints a structured success/failure report to stderr. Closes the opacity pattern surfaced in issues #8 (server EOF on initialize) and #19 (cwd context confusion) where setup failures had no in-product diagnostic path and forced GitHub-issue-driven debugging. Doctor checks: binary on PATH, working directory has expected markers, .coverctl.yaml resolvable, MCP initialize roundtrip OK, sample tool dispatch (check --validate) OK, mode auto-detect signal. Outputs each step as PASS/FAIL with remediation. Output: internal/cli/cmd_mcp.go new subcommand, command help text, mcp.mdx doctor section, regression test.'
      requirements: []
    - id: public-surface-wedge-reframe
      title: Public Surface Wedge Reframe
      description: 'Re-anchor README and Astro landing page body to the agent-loop wedge. Hero already aligned but body content (Problem/Solution/Cards/Designed for Teams) still argues domain-coverage features inside the Codecov category frame. Scope: rewrite The Problem + The Solution sections around agent-loop struggling moment (not ''one number for whole codebase'' Codecov critique); replace generic Cards with agent-loop-anchored value props; cut ''Designed for Teams'' section; add named category phrase ''agent-loop coverage governance'' to hero + first paragraph and repeat through copy; remove copy leaks (''first-class'', ''domain-driven design principles'', uncontextualized ''local-first''); compress over-feature-densified sub-line; trim landing hero CTAs from 3 to 2 (drop GitHub from hero, available in nav); drop Languages badge (claim already in tagline). Output: rewritten docs/src/content/docs/index.mdx body + README copy edits.'
      requirements: []
    - id: transparency-moment-artifact
      title: Transparency-Moment Artifact
      description: 'Add the missing proof artifact that shows what coverctl looks like inside an agent session. Three components: (1) 6-line agent-session transcript using ai-expert''s concrete copy (user prompt → agent edits → coverctl check tool call → structured rejection → coverctl suggest chained call → agent''s natural-language plan with explicit failing domain + uncovered lines); (2) anti-pattern card with three concrete hallucination markers (lowering thresholds as ''fix'', claiming coverage rose without a new check call, ignoring error_code on retry); (3) compressed agent-calibration block (''does well'' / ''watch for'' / ''contract is in docs'') promoted above the install line so trust is calibrated before install (Mollick informed-use vs misinformed-use). Land in both README (after hero) and landing (between hero and feature cards). Validate: run prompt through real Claude Code session before publishing to ensure transcript matches actual client rendering.'
      requirements: []
    - id: security-and-privacy-public-posture
      title: Security and Privacy Public Posture
      description: 'Surface coverctl''s full AI-infrastructure maturity on public copy. Today README documents only the input boundary (sanitization rejecting dangerous flags); the output-boundary canonicalization that ships in internal/mcp/sanitize_output.go is invisible. Procurement-grade buyers (Jordan) read security copy line-by-line and downgrade trust on incomplete threat models. Scope: (1) replace ''Security note'' with two-bullet Security Boundaries section covering input + output + Lethal Trifecta framing; (2) reframe ''MCP-native, first-class MCP server'' to ''agent-loop native via MCP'' with explicit multi-vendor acknowledgment (Anthropic/OpenAI/Google/MS/AWS, Linux Foundation co-governance) — addresses procurement vendor-lock-in question; (3) add three-sentence privacy-first + eval-gated framing (local-first default, opt-in telemetry, 50+ adversarial eval scenarios); (4) compatibility surface single source (test against Claude Code, Claude Desktop, Cursor, Cline, Aider, Continue, OpenCode) — eliminates README/landing inconsistency. Mirror to landing where appropriate.'
      requirements: []
    - id: community-and-platform-teams-surface-area
      title: Community and Platform-Teams Surface Area
      description: 'ICP brief names community-led as PRIMARY motion and content-led as secondary. Today neither README nor landing exposes any community surface area: no Claude Code marketplace link, no MCP Registry link, no Discussions CTA, no GitHub Sponsors button, no contributor recognition. Strategy without distribution. Scope: (1) add Community section to README between Quickstart and CLI reference (marketplace + MCP registry + Discussions + Sponsor + maintainer credit); (2) add For Platform & DevEx Teams section linking threat-model + rejection-schema + GTM-metrics-spec artifacts plus low-friction inbound path via ''platform-evaluation'' GitHub issue label — opens Stage 4 monetization trigger detection; (3) one-line PMF survey nudge (''Used coverctl for a few weeks? Run coverctl survey to share PMF feedback'') under Community — zero-cost activation of existing instrumentation; (4) pull-quote the ICP brief''s customer struggling-moment line above install commands (Gerhardt audience-first); (5) pre-emptive monetization framing in ''Why this exists'' (free CLI/MCP forever, hosted history additive not paywall) — defuses bait-and-switch perception when Stage 2 launches.'
      requirements: []
    - id: readme-and-landing-information-architecture
      title: README and Landing Information Architecture
      description: 'UX-layer fixes to scan/hierarchy/IA on both surfaces. Today README hides primary action (install) below 22 lines of prose; landing CardGrid equalizes agent and terminal paths the strategy says are not equal; trust-calibration content lives only in quick-start.mdx (post-install, too late). Scope: (1) Reorder README first viewport — install line + MCP JSON config + agent-prompt example as first scannable block (hero → install → transcript → why → tool reference → CLI reference → configuration → community → security → contributing); (2) add scannable nav strip near top of README ([Get started] · [MCP tools] · [CLI reference] · [Configuration] · [Why this exists]); (3) collapse ''Quickstart for humans'' and ''Golden path'' into CLI reference (they''re how-to fragments, not first-touch); (4) move detailed Architecture section to dedicated ARCHITECTURE.md (or below Contributing); (5) replace symmetric Quick Start CardGrid on landing with asymmetric primary agent card + inline secondary terminal link (Von Restorff + Hick''s); (6) add trust-calibration one-liner immediately after wedge claim on both surfaces (''Works best on standard Go/Python/JS/Java/Rust... Mock-heavy code or exotic monorepos may need explicit domains: block'').'
      requirements: []
    - id: site-sidebar-ia-re-architecture
      title: Site Sidebar IA Re-architecture
      description: 'Replace 5-group sidebar (Getting Started / CLI Reference / Configuration / Guides / Architecture) with 4 groups ordered around the agent-loop journey: (1) Start here — agent quick-start, terminal quick-start, install; (2) Use coverctl with your agent — agent-loop tutorial, MCP tool reference, rejection schema, when agent gets it wrong; (3) Configure and operate — policy basics, domains, policies, advanced, CI integration, monorepos; (4) Reference — CLI commands, build flags, architecture (or move out of site). Plus consolidate the two parallel quick-starts into a single canonical agent-mode path with terminal-mode as a subsection. Output: docs/astro.config.mjs sidebar rewrite + cross-link audit.'
      requirements: []
    - id: agent-loop-tutorial-page-and-canonical-diagram
      title: Agent-Loop Tutorial Page and Canonical Diagram
      description: 'Two coupled additions. (1) New top-level Diataxis-tutorial page docs/src/content/docs/agent-loop-tutorial.mdx walking one full agent-loop cycle: install + wire MCP, ask agent to add a feature, watch agent call check, see structured failure, watch agent call suggest, watch agent fix, re-run check, commit. This is the missing ''mental model build'' page; without it every other page is decoded against a wrong (Codecov-shaped) model. (2) Canonical agent-loop Mermaid diagram (~30 lines) showing human → agent → edit → check (MCP) → structured rejection → suggest → fix → check pass → commit cycle. Render once, embed in landing index.mdx, mcp.mdx, and the new tutorial page. Adds the missing visceral/visual layer for an inherently spatial concept.'
      requirements: []
    - id: pre-wedge-content-purge-and-seo-frontmatter-audit
      title: Pre-Wedge Content Purge and SEO Frontmatter Audit
      description: 'Single combined audit pass over every non-landing docs page (20 files). For each file: (a) rewrite frontmatter title and description so the wedge keywords (''agent-loop coverage'', ''MCP coverage server'', ''agent-callable coverage'') appear in the first 160 characters — addresses Google snippet UI undermining wedge framing pre-click; (b) reframe opening paragraph and any pre-wedge framing (Go-first, CLI-first, domain-policy-as-headline, missing MCP context). Specific files at minimum: installation.mdx (kill ''Go 1.25+ required''; brew first, go install fallback), cli/index.mdx (''CLI is the substrate behind the MCP server''), configuration/index.mdx (lead with ''what your agent sees in .coverctl.yaml''), architecture/index.mdx (likely redirect to ARCHITECTURE.md), guides/ci-integration.mdx (mode-aware MCP framing). Pull Search Console baseline before/after if available.'
      requirements: []
    - id: diataxis-split-for-oversized-pages
      title: Diataxis Split for Oversized Pages
      description: Three pages exceed 200 lines and mix Diataxis modes; split each by mode. (1) configuration/index.mdx (212 lines) — split into 1 reference page (file format) + N narrow how-to pages (already partial via policies/domains/advanced subpages; parent is bloated). (2) architecture/index.mdx (235 lines) — likely redundant with ARCHITECTURE.md; either delete and redirect to repo or merge with reduced scope. (3) guides/ci-integration.mdx (347 lines) — split into 1 tutorial ('Your first coverctl-gated PR') + N how-to recipes (cache strategy, monorepo CI, ratchet, fail-under). Tutorials and reference do not co-habit well; visitors scanning for env-var name should not scroll through tutorial prose.
      requirements: []
    - id: jordan-path-site-surface-(for-platform-teams)
      title: Jordan-Path Site Surface (For Platform Teams)
      description: Three new pages targeting secondary buyer persona Jordan (platform/devex evaluator). (1) docs/src/content/docs/for-platform-teams.mdx — single landing page summarizing procurement story (security boundaries, telemetry posture, deployment shape, license, monetization roadmap) with deep-links into existing artifacts. (2) docs/src/content/docs/security/threat-model.mdx — render of docs/security/mcp-threat-model.md into the docs site (currently only repo markdown). (3) docs/src/content/docs/security/rejection-schema.mdx — split out of mcp.mdx so procurement reviewers can deep-link directly to the contract. Adds Stage 4 monetization trigger detection mechanism (currently invisible). Includes sidebar entry and link from README For Platform Teams section into site versions.
      requirements: []
    - id: comparison-pages
      title: Comparison Pages
      description: 'Three comparison pages capturing lower-funnel evaluation intent: docs/src/content/docs/compare/coverctl-vs-codecov.mdx, compare/coverctl-vs-coveralls.mdx, compare/coverctl-vs-native.mdx (covers go test -cover / pytest --cov / nyc). Each follows Dunford alternatives structure: what is coverctl, what is the alternative, who is each best for, when does coverctl win. Honest (''Codecov is better if you primarily care about post-merge dashboards''). Captures search traffic for ''codecov alternative'' / ''codecov vs coveralls'' which coverctl ranks for none today; frames silent comparisons that visitors form on their own; reinforces Lochhead category-design discipline by naming alternatives explicitly.'
      requirements: []
    - id: content-led-site-infrastructure
      title: Content-Led Site Infrastructure
      description: 'Three lightweight surfaces enabling secondary motion (content-led) with currently zero infrastructure: (1) /blog/ — long-form posts using Astro Starlight blog plugin (or starlight-blog) seeded with 5 articles from POV doc + closed-issue findings: ''Why agent-loop coverage governance is a different category'', ''What agents actually do when they read coverctl output'', ''The Lethal Trifecta and how coverctl defends both directions'', ''From Codecov dashboards to agent-loop signals: a migration story'', ''Designing rejection schemas agents can recover from''. (2) /changelog/ — auto-generated from Relicta release notes / git tags. (3) RSS feed for both via @astrojs/rss. Without these, every conference talk and Hacker News post points to a static reference manual; acquisition surface area for content-led motion is zero.'
      requirements: []
    - id: social-proof-surface
      title: Social-Proof Surface
      description: 'Visible community-led credibility on landing and a dedicated /community/ page. Cheapest first: GitHub star + contributor shields, MCP Registry presence link with explicit ''N MCP-capable clients have installed coverctl'' text, Claude Code marketplace install count if API allows. Then anonymized user quotes from Discord / GitHub Discussions (''I caught a regression this morning before the PR was opened — first time that''s happened''). Then auto-pulled GitHub Discussions excerpts. Honest sequencing: ship cheap shields first; manual quotes when 3+ exist; automated discussions widget last. A site that says community-led but shows zero community reads as aspirational.'
      requirements: []
    - id: pricing-and-roadmap-page
      title: Pricing and Roadmap Page
      description: 'Single page docs/src/content/docs/pricing.mdx (top-level, sidebar slot). Three short paragraphs: (a) coverctl CLI and MCP server are Apache-2.0 licensed and free; (b) hosted layer for cross-repo coverage history, team dashboards, cloud MCP relay is on the roadmap, stage gates documented in docs/strategy/monetization-decision.md; (c) early-access waitlist via GitHub issue with label ''hosted-waitlist''. Defuses Stage 2 launch reading as bait-and-switch; captures waitlist signal as Stage 2 readiness metric; removes one Jordan-class procurement objection. Does NOT commit to dates or prices; commits to honesty about structure.'
      requirements: []
    - id: cli-reference-page-template-standardization
      title: CLI Reference Page Template Standardization
      description: 'Standardize all 7 cli/*.mdx pages to a consistent reference template: (1) Synopsis — one-line usage string; (2) When to use it — two sentences max; (3) Flags — table with flag/type/default/purpose columns; (4) Examples — 3 progressively complex blocks with comments; (5) Exit codes — table with code/meaning; (6) Related — links to next-step commands. Reference users scan; today''s pages render as how-to prose. Template reduces lookup time for returning users and builds muscle memory across pages. Apply to cli/check.mdx, cli/init.mdx, cli/run.mdx, cli/watch.mdx, cli/report.mdx, cli/other.mdx, cli/index.mdx.'
      requirements: []
    - id: site-wayfinding-and-print-polish
      title: Site Wayfinding and Print Polish
      description: 'Three lightweight site-wide UX adds. (1) Universal ''Next'' component at end of every page — single forward-arrow link for tutorial pages, 2-3 LinkCards for reference/how-to pages. Cuts dead-end exits at page bottom (Goal-Gradient + Peak-End). (2) Print stylesheet docs/src/styles/print.css with @media print rules: hide sidebar/nav, force light theme, kill backgrounds, expand collapsed sections, ensure code blocks wrap. ~30 lines. Procurement readers print PDFs for internal review. (3) Custom 404 page with three suggested links (Get started / MCP tools / CLI reference) recovering stray visitors instead of bouncing.'
      requirements: []
    - id: component-primitive-vocabulary-and-configuration-snippet-pattern
      title: Component Primitive Vocabulary and Configuration Snippet Pattern
      description: 'Two coupled doc-style improvements. (1) Document the Astro Starlight component vocabulary in CONTRIBUTING.md or new docs-style-guide.md: always Tabs for language-specific examples, always Aside type=''caution'' for warnings, never blockquote except actual quotes, always Steps for tutorial-shape onboarding. Visitors learn pattern once and generalize across pages (Gestalt similarity). (2) Apply paired-snippet pattern to configuration/{index,policies,domains,advanced}.mdx: commented YAML on the left, narrative explanation on the right via Steps or two-column layout. Replaces today''s pattern of stacked YAML examples with no commentary. Progressive disclosure rather than dump.'
      requirements: []
constraints: []
version: 0.1.0
