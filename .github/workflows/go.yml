name: Go CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

# Workflow-level default: every job inherits read-only contents access. Jobs
# that need additional scopes (e.g. security-events: write) override locally.
# Without this, the GITHUB_TOKEN inherits its repo-default permissions, which
# may be broader than necessary — flagged by CodeQL as
# actions/missing-workflow-permissions.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Cache modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
      - name: Install deps
        run: go mod download
      - name: Run tests
        run: go test ./... -cover

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.7.2

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
      - name: Install nox
        # Bumped from v0.7.0: required for reliable baseline suppression in
        # SARIF output. The v1.15.0 push produced 3320 false-positive
        # alerts because npm integrity hashes (docs/package-lock.json) and
        # Go module sums (go.sum) match nox credential-detection rules.
        # `.nox/baseline.json` is committed to the repo; nox 0.8 suppresses
        # any finding present in the baseline so SARIF stays signal-only.
        run: |
          curl -sL https://github.com/nox-hq/nox/releases/download/v0.8.1/nox_0.8.1_linux_amd64.tar.gz | tar xz -C /usr/local/bin nox
      - name: Run nox security scan
        # New genuine findings still surface as Code Scanning alerts.
        # Refresh the baseline locally with `nox baseline write` after
        # triaging legitimate new findings.
        run: |
          nox -format sarif -output . scan . || true
          if [ ! -f results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > results.sarif
          fi
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4
        with:
          sarif_file: results.sarif
        if: always()

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
      - name: Build coverctl
        run: go build -o coverctl .
      - name: Run coverage check (dogfooding)
        run: ./coverctl check --config .coverctl.yaml
      - name: Capture structured coverage outputs
        if: always()
        run: mkdir -p .cover/ci-artifacts && ./coverctl check --config .coverctl.yaml --output json > .cover/ci-artifacts/check.json 2>&1 || true && ./coverctl report --config .coverctl.yaml --profile .cover/coverage.out --output json > .cover/ci-artifacts/report.json 2>&1 || true
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-structured-output
          path: .cover/ci-artifacts/
          if-no-files-found: warn
