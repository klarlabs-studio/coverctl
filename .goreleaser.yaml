# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: coverctl

before:
  hooks:
    - go mod tidy

builds:
  - id: coverctl
    main: .
    binary: coverctl-{{ .Os }}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/coverctl/internal/cli.Version={{.Version}}
      - -X github.com/felixgeelhaar/coverctl/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/felixgeelhaar/coverctl/internal/cli.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .Binary }}"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Sigstore keyless signing of the checksums file. Verifying the signature on
# checksums.txt transitively verifies every artifact (each artifact's hash
# is bound by the signed checksums). Uses GitHub OIDC to mint short-lived
# certificates from Fulcio; no long-lived signing key to manage or rotate.
#
# Verify with:
#   cosign verify-blob \
#     --certificate-identity-regexp '^https://github.com/felixgeelhaar/coverctl/.*' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature checksums.txt.sig \
#     --certificate checksums.txt.pem \
#     checksums.txt
signs:
  - id: cosign-checksums
    cmd: cosign
    artifacts: checksum
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - '--yes'
      - '--bundle=${signature}'
      - '${artifact}'
    output: true

# SBOM generation per build using Syft (CycloneDX JSON, the OWASP-canonical
# format). One SBOM per OS/arch artifact; uploaded alongside the binaries.
sboms:
  - id: syft-sbom
    artifacts: archive
    documents:
      - '${artifact}.sbom.cdx.json'
    cmd: syft
    args:
      - '$artifact'
      - '--output'
      - 'cyclonedx-json=$document'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# Homebrew tap is updated via custom script (scripts/update-homebrew-tap.sh)
# to support both macOS and Linux via Linuxbrew

release:
  github:
    owner: felixgeelhaar
    name: coverctl
  draft: false
  prerelease: auto
  name_template: "Release {{.Tag}}"
